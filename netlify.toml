[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://nodejs304.dszcbaross.edu.hu/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/users/*"
  to = "https://nodejs304.dszcbaross.edu.hu/users/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "https://nodejs304.dszcbaross.edu.hu/admin/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/login"
  to = "https://nodejs304.dszcbaross.edu.hu/login"
  status = 200  
  force = true

[[redirects]]
  from = "/logout"
  to = "https://nodejs304.dszcbaross.edu.hu/logout"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200