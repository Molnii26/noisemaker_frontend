[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "https://nodejs304.dszcbaross.edu.hu/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/users/*"
  to = "https://nodejs304.dszcbaross.edu.hu/users/:splat"
  status = 200
  force = true

[[redirects]]
from = "/cart"
to = "https://nodejs304.dszcbaross.edu.hu/cart"
status = 200
force = true

[[redirects]]
  from = "/products"
  to = "https://nodejs304.dszcbaross.edu.hu/products"
  status = 200
  force = true

  [[redirects]]
  from = "/categories"
  to = "https://nodejs304.dszcbaross.edu.hu/categories"
  status = 200
  force = true

  [[redirects]]
  from = "/orders"
  to = "https://nodejs304.dszcbaross.edu.hu/orders"
  status = 200
  force = true


[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200